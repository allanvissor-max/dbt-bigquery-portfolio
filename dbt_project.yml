name: 'my_new_project'
version: '1.0.0'

config-version: 2

profile: 'default'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  my_new_project:
    staging:
      +materialized: view

    marts:
      +materialized: table

    quality:
      +materialized: table

seeds:
  my_new_project:
    customers:
      +column_types:
        customer_id: string
        customer_name: string
        country: string
        risk_level: string
        customer_since: string

    transactions:
      +column_types:
        transaction_id: string
        customer_id: string
        transaction_date: string
        amount_eur: string
        transaction_type: string