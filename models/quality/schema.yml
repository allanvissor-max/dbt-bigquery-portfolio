version: 2

models:
  - name: dq_transaction_issues
    description: Data quality issue detection table for transaction data.
    columns:
      - name: transaction_id
        description: Transaction identifier from source data.

      - name: customer_id
        description: Customer identifier from source data.

      - name: transaction_date_raw
        description: Original transaction date value from source data.

      - name: amount_eur_raw
        description: Original amount value from source data.

      - name: transaction_type
        description: Original transaction type from source data.

      - name: issue_type
        description: Type of detected data quality issue.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'MISSING_TRANSACTION_ID'
                  - 'DUPLICATE_TRANSACTION_ID'
                  - 'MISSING_CUSTOMER_ID'
                  - 'ORPHAN_CUSTOMER_ID'
                  - 'MISSING_TRANSACTION_DATE'
                  - 'INVALID_TRANSACTION_DATE'
                  - 'MISSING_AMOUNT'
                  - 'NEGATIVE_AMOUNT'
                  - 'ZERO_AMOUNT'
                  - 'INVALID_TRANSACTION_TYPE'
                  - 'HIGH_VALUE_REVIEW'